services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: profile-gen-backend
    env_file:
      - ./backend/.env
    environment:
      PORT: 3001
    ports:
      - "3001:3001"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: profile-gen-frontend
    depends_on:
      - backend
    ports:
      - "4200:80"
    restart: unless-stopped
